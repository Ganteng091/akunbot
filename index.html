<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penyimpanan Akun Bot</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    padding: 15px;
    margin: 0;
    color: white;
}

h2 {
    text-align: center;
    font-size: 20px;
    margin-bottom: 20px;
    text-shadow: 0 0 10px cyan;
}

#list {
    max-width: 600px;
    margin: auto;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding: 12px;
    margin: 10px 0;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 0 10px rgba(0,255,255,0.2);
}

/* TEXT */
.label {
    color: #00f2fe;
    font-size: 14px;
}

/* FLEX BIAR RAPI DI HP */
.row {
    display: flex;
    flex-direction: column;
    gap: 5px;
}

/* BUTTON */
button {
    width: 100%;
    margin-top: 5px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(45deg, #00f2fe, #4facfe);
    color: white;
    font-weight: bold;
    font-size: 14px;
    cursor: pointer;
}

/* DESKTOP MODE */
@media(min-width: 600px) {
    .row {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
    }

    button {
        width: auto;
        padding: 6px 12px;
        margin-left: 10px;
    }
}
</style>
</head>

<body>

<h2>🤖 Penyimpanan Akun Bot BY ZAIM GANTENG😘</h2>

<div id="list"></div>

<script>
const data = [

"marpet123456789@gmail.com:Kikok123",
"vincentborcesvildosola@gmail.com:Aswang005",

"henrijsliv@gmail.com:Henrijs123",
"aimargatuno@gmail.com:Gataluna4410",
"vados235@mail.ru:Odon2012", 
];

const container = document.getElementById("list");

data.forEach(item => {
    const [email, pass] = item.split(":");

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
        <div class="row">
            <span><b class="label">Email:</b> ${email}</span>
            <button onclick="copyText('${email}')">Copy Email</button>
        </div>
        <div class="row">
            <span><b class="label">Password:</b> ${pass}</span>
            <button onclick="copyText('${pass}')">Copy Password</button>
        </div>
    `;

    container.appendChild(div);
});

function copyText(text) {
    navigator.clipboard.writeText(text);
    alert("✔ Disalin: " + text);
}
</script>

</body>
</html>
