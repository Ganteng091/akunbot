<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Penyimpanan Akun Bot</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    padding: 20px;
    color: white;
}

h2 {
    text-align: center;
    margin-bottom: 30px;
    text-shadow: 0 0 10px cyan;
}

#list {
    max-width: 700px;
    margin: auto;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding: 15px;
    margin: 15px 0;
    border-radius: 15px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 0 15px rgba(0,255,255,0.2);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.02);
    box-shadow: 0 0 25px cyan;
}

button {
    margin-left: 10px;
    padding: 6px 12px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(45deg, #00f2fe, #4facfe);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
    background: linear-gradient(45deg, #43e97b, #38f9d7);
}

.label {
    color: #00f2fe;
}
</style>
</head>

<body>

<h2>🤖 Penyimpanan Akun Bot</h2>

<div id="list"></div>

<script>
const data = [
"gjfbf@naver.com:Gjfbf1",
"ninhkul@gmail.com:Demongoat123",
"ezhik-deil@bk.ru:Maestrokido1",
"myandimata4@gmail.com:Godofwar2",
"marpet123456789@gmail.com:Kikok123",
"vincentborcesvildosola@gmail.com:Aswang005",
"lesterdave641@gmail.com:Az8341563895",
"aidar.nafickow2016@yandex.ru:02Diamondrush2001",
"babichev-97@mail.ru:011097Dad",
"petrus.gocar86@gmail.com:Mar123",
"nirajmagar207@gmail.com:Swethome1"
];

const container = document.getElementById("list");

data.forEach(item => {
    const [email, pass] = item.split(":");

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
        <b class="label">Email:</b> ${email}
        <button onclick="copyText('${email}')">Copy</button>
        <br><br>
        <b class="label">Password:</b> ${pass}
        <button onclick="copyText('${pass}')">Copy</button>
    `;

    container.appendChild(div);
});

function copyText(text) {
    navigator.clipboard.writeText(text);
    alert("✔ Berhasil disalin: " + text);
}
</script>

</body>
</html>
